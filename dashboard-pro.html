<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Pro | Fiddle Bro's</title>
    
    <link rel="icon" type="image/jpeg" href="flavicon.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray">

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <p class="loader-text">Vérification de l'accès sécurisé...</p>
    </div>

    <header class="dash-header">
        <a href="index.html" class="logo">
            <img src="flavicon.jpg" alt="Logo Fiddle Bro's">
            <span>Fiddle Bro's Pro</span>
        </a>
        <div class="user-info">
            <span class="badge-email" id="displayEmail">Chargement...</span>
            <button class="btn btn-outline-danger btn-sm" id="btnLogout">Déconnexion</button>
        </div>
    </header>

    <main class="container-dash">
        
        <div class="page-header">
            <div class="header-titles">
                <h1>Base Clients</h1>
                <p class="subtitle">Visualisez et gérez votre communauté en temps réel.</p>
            </div>
            <button class="btn btn-primary" id="btnExport">
                📥 Exporter (CSV)
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon-wrapper">👥</div>
                <div class="stat-details">
                    <h3>Total Inscrits</h3>
                    <div class="value" id="statTotalClients">-</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrapper">⭐</div>
                <div class="stat-details">
                    <h3>Points Distribués</h3>
                    <div class="value" id="statTotalPoints">-</div>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-toolbar">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchClient" class="search-input" placeholder="Rechercher un client (nom, email, téléphone...)">
                </div>
            </div>

            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Email</th>
                            <th>Points cumulés</th>
                            <th>Date d'inscription</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="4" class="empty-state">Chargement des données...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="fiddle-pro.js"></script>
</body>
</html>
